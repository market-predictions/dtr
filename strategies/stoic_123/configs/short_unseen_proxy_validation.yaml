study_id: STOIC123-WP-20260723-03
frozen_on: 2026-07-23
status: SOURCE_QUALIFICATION_PENDING
purpose: >-
  Test whether the post-hoc NQ no-map short-only observation replicates without
  modification on disjoint Dukascopy USATECH bid-CFD proxy history. This is a
  falsification screen, not CME NQ futures validation.

hypothesis:
  source_arm_id: S123_M0_NO_MAP_CONTROL
  direction_mode: short_only
  phase1_config_path: strategies/stoic_123/configs/phase1.yaml
  phase1_expected_sha256: 5d6909bd5740e1cdea9bd3d47a9818289a6faa8b9a61338726afdc53289ff805
  parameter_changes_allowed: false

source_contract:
  classification: Dukascopy USATECH bid-CFD Nasdaq-100 proxy; not CME NQ futures
  price_stream: bid_only
  signal_and_execution_prices: same_bid_ohlc_stream
  execution_tick_size: 0.25
  point_value_usd: 20.0
  commission_per_side_usd: 2.25
  source_quote_increment: 0.001
  inactive_definition: volume_lte_zero
  timestamp_basis: UTC converted to naive UTC before existing resampling
  partitions:
    older_history:
      role: primary_long_history_falsification
      start_inclusive_utc: 2015-01-01
      end_exclusive_utc: 2022-01-01
      labels: [2015, 2016, 2017, 2018, 2019, 2020, 2021]
      expected_sha256_by_label:
        2015: PENDING_SOURCE_QUALIFICATION
        2016: PENDING_SOURCE_QUALIFICATION
        2017: PENDING_SOURCE_QUALIFICATION
        2018: PENDING_SOURCE_QUALIFICATION
        2019: PENDING_SOURCE_QUALIFICATION
        2020: PENDING_SOURCE_QUALIFICATION
        2021: PENDING_SOURCE_QUALIFICATION
    forward_2026:
      role: fresh_forward_proxy_check
      start_inclusive_utc: 2026-01-01
      end_exclusive_utc: 2026-07-23
      labels: [2026_YTD]
      expected_sha256_by_label:
        2026_YTD: PENDING_SOURCE_QUALIFICATION

comparators:
  - both_direction_full_sequence
  - long_only_full_sequence
  - short_only_ema_break
  - short_only_ema_break_retest
  - fifty_deterministic_matched_time_short_controls

execution_tests:
  baseline_slippage_ticks_each_side: 1.0
  stressed_slippage_ticks_each_side: 2.0
  entry_delays_minutes: [1, 5]
  max_hold_minutes: 1440
  management_direction: both

promotion_screen:
  classification_if_all_pass: RETAIN_FOR_PAID_NQ_FUTURES_VALIDATION
  otherwise: REJECT_OR_HOLD_NO_PROMOTION
  all_required:
    - older_history_trade_count_gte_500
    - older_history_expectancy_positive
    - older_history_date_block_lo95_positive
    - at_least_five_of_seven_older_years_positive
    - largest_positive_year_share_lte_0_40
    - older_history_two_tick_expectancy_positive
    - older_history_one_minute_delay_expectancy_positive
    - forward_2026_trade_count_gte_30
    - forward_2026_expectancy_positive
    - forward_2026_two_tick_expectancy_positive
    - full_sequence_mechanism_value_over_ema_break
    - matched_time_short_control_passes
  mechanism_value_rule: >-
    Full sequence must exceed short EMA-break-only by at least 0.05R expectancy
    or 20% return-to-drawdown on older history, and must not underperform the
    control on 2026 YTD.
  matched_control_rule: >-
    Every replicate must cover at least 90% of source events, median holding
    period ratio must remain between 0.75 and 1.25, and full-sequence expectancy
    must exceed the 95th percentile of matched-control expectancy in both
    partitions.

restrictions:
  - No source partition may overlap the inspected 2022-12-26 through 2025-12-10 NQ sample.
  - No 2022-2025 USATECH performance may be used for candidate selection or promotion.
  - No parameter, timeframe, threshold, session, stop, target, exit, delay, or matching-rule search.
  - No pooling of older history and 2026 YTD for promotion decisions.
  - No proxy result may be represented as CME NQ futures evidence.
  - No Pine port, sizing, alerts, paper deployment, or live trading authorization.
