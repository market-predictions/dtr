name: Temporary GBPUSD failure-log diagnostic

on:
  pull_request:
    paths:
      - .github/workflows/temporary_gbpusd_log_diagnostic.yml
      - temporary/gbpusd_log_diagnostic.trigger

permissions:
  actions: read
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Download completed job log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/89168211295/logs" \
            --output /tmp/gbpusd_job.log
          tail -n 220 /tmp/gbpusd_job.log > gbpusd_failure_tail.txt
          grep -n -E "Traceback|Error|Exception|Killed|failed|Assertion" \
            /tmp/gbpusd_job.log > gbpusd_failure_matches.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: gbpusd-failure-diagnostic
          path: |
            gbpusd_failure_tail.txt
            gbpusd_failure_matches.txt
          retention-days: 1
          if-no-files-found: error
