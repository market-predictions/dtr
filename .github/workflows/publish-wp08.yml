name: Publish WP08 advanced context evidence

on:
  pull_request:
    branches:
      - agent/nq-selection-robustness
    types: [opened, synchronize]
    paths:
      - .github/workflows/publish-wp08.yml

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'agent/nq-advanced-context'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/nq-advanced-context
          fetch-depth: 0
          token: ${{ github.token }}
      - name: Concatenate and verify encoded payload
        run: |
          set -euo pipefail
          cat .github/wp08-payload/chunk-* > /tmp/wp08-payload.b64
          test "$(wc -c < /tmp/wp08-payload.b64)" -eq 73904
          echo '98f3ba86affe92ad5b34d6a2936adbc3c0979e9e337a3e3a896a307c0ff443b5  /tmp/wp08-payload.b64' | sha256sum --check -
      - name: Decode payload
        run: |
          set -euo pipefail
          base64 --decode /tmp/wp08-payload.b64 > /tmp/wp08-payload.tar.gz
      - name: Verify and extract archive
        run: |
          set -euo pipefail
          echo '09b5c48e075bba068dc1729b39ae4d02941f8ec5651da46223b45f917ab50f6b  /tmp/wp08-payload.tar.gz' | sha256sum --check -
          tar -xzf /tmp/wp08-payload.tar.gz -C .
      - name: Remove publication staging
        run: |
          set -euo pipefail
          rm -rf .github/wp08-payload
          rm -f .github/workflows/publish-wp08.yml
          test -z "$(find . -type d -name __pycache__ -print -quit)"
          test -z "$(find . -type f \( -name '*.zip' -o -name '*.parquet' -o -name '*.pkl' \) -print -quit)"
      - name: Commit reviewed evidence
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Add advanced DTR context research evidence'
          git push origin HEAD:agent/nq-advanced-context
