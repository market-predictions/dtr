name: Temporary WP6 Fixture Correction

on:
  pull_request:
    paths:
      - ".github/workflows/wp6-fixture-correction.yml"

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          show-progress: false

      - name: Correct explicit off-grid fixture
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("strategies/asia_sweep/tests/test_proxy_normalization.py")
          text = path.read_text()
          old = 'normalize_proxy_event(_event(entry=100.12300000000001), _CONFIG)'
          new = 'normalize_proxy_event(_event(entry="100.1230001"), _CONFIG)'
          if text.count(old) != 1:
              raise SystemExit("expected fixture text not found exactly once")
          path.write_text(text.replace(old, new))
          PY

      - name: Commit fixture correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add strategies/asia_sweep/tests/test_proxy_normalization.py
          git commit -m "Correct explicit off-grid proxy fixture"
          git push origin "HEAD:${{ github.head_ref }}"
