name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Prepare source snapshot
        run: tar --exclude=.git --exclude=dtr-source.tar.gz -czf dtr-source.tar.gz .

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: dtr-source-snapshot
          path: dtr-source.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Ruff
        id: ruff
        shell: bash
        run: |
          set +e
          pipx run ruff==0.15.22 check . > ruff-report.txt 2>&1
          status=$?
          cat ruff-report.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Ruff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Ruff gate
        run: test "${{ steps.ruff.outputs.exit_code }}" = "0"

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Tests
        run: pytest
