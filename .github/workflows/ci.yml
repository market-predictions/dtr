name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Ruff
        id: ruff
        shell: bash
        run: |
          set +e
          pipx run ruff==0.15.22 check . > ruff-report.txt 2>&1
          status=$?
          cat ruff-report.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Ruff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Ruff gate
        run: test "${{ steps.ruff.outputs.exit_code }}" = "0"

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Tests
        run: pytest

  stacey_burke_source:
    name: Qualify ${{ matrix.symbol }}
    needs: test
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'agent/stacey-burke-fx-source-census'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        symbol:
          - EURUSD
          - GBPUSD
          - USDCHF
          - AUDUSD
          - NZDUSD
          - USDCAD
          - USDJPY
          - EURJPY
          - GBPJPY
          - EURGBP

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore immutable source cache
        id: source-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/sb-source/${{ matrix.symbol }}
          key: stacey-burke-fx-v1-${{ matrix.symbol }}-2015-2026-07-24

      - name: Acquire canonical BID and ASK data
        id: acquire
        if: steps.source-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          mkdir -p "${RUNNER_TEMP}/sb-source/${{ matrix.symbol }}"
          python scripts/acquire_stacey_burke_fx.py \
            --symbol "${{ matrix.symbol }}" \
            --start-year 2015 \
            --end-year 2025 \
            --ytd-end-exclusive 2026-07-24 \
            --workers 8 \
            --out "${RUNNER_TEMP}/sb-source/${{ matrix.symbol }}"

      - name: Save completed immutable source cache
        if: >-
          steps.source-cache.outputs.cache-hit != 'true' &&
          steps.acquire.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/sb-source/${{ matrix.symbol }}
          key: stacey-burke-fx-v1-${{ matrix.symbol }}-2015-2026-07-24

      - name: Qualify source without performance execution
        id: qualify
        if: >-
          steps.source-cache.outputs.cache-hit == 'true' ||
          steps.acquire.outcome == 'success'
        continue-on-error: true
        run: |
          mkdir -p "${RUNNER_TEMP}/sb-qualification"
          python scripts/qualify_stacey_burke_fx.py \
            --data "${RUNNER_TEMP}/sb-source/${{ matrix.symbol }}" \
            --symbol "${{ matrix.symbol }}" \
            --start-year 2015 \
            --end-year 2025 \
            --ytd-end-exclusive 2026-07-24 \
            --out "${RUNNER_TEMP}/sb-qualification/${{ matrix.symbol }}_source_qualification.json"

      - name: Upload preserved pair source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stacey-burke-fx-source-${{ matrix.symbol }}
          path: ${{ runner.temp }}/sb-source/${{ matrix.symbol }}
          if-no-files-found: warn
          compression-level: 0
          retention-days: 90

      - name: Upload compact qualification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stacey-burke-fx-qualification-${{ matrix.symbol }}
          path: ${{ runner.temp }}/sb-qualification/${{ matrix.symbol }}_source_qualification.json
          if-no-files-found: warn
          retention-days: 90

      - name: Enforce pair source gate
        if: always()
        shell: bash
        run: |
          cache_hit="${{ steps.source-cache.outputs.cache-hit }}"
          acquire_outcome="${{ steps.acquire.outcome }}"
          qualify_outcome="${{ steps.qualify.outcome }}"

          if [[ "$cache_hit" != "true" && "$acquire_outcome" != "success" ]]; then
            echo "Source acquisition failed for ${{ matrix.symbol }}."
            exit 1
          fi

          if [[ "$qualify_outcome" != "success" ]]; then
            echo "Source qualification failed for ${{ matrix.symbol }}."
            exit 1
          fi

  stacey_burke_aggregate:
    name: Aggregate Stacey Burke source gate
    needs: stacey_burke_source
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.head_ref == 'agent/stacey-burke-fx-source-census'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download available qualification evidence
        id: download-evidence
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: stacey-burke-fx-qualification-*
          path: ${{ runner.temp }}/sb-qualification-inputs
          merge-multiple: true

      - name: Build universe source decision
        id: aggregate
        continue-on-error: true
        run: |
          mkdir -p "${RUNNER_TEMP}/sb-qualification-inputs"
          python scripts/summarize_stacey_burke_fx_qualification.py \
            --inputs "${RUNNER_TEMP}/sb-qualification-inputs" \
            --out "${RUNNER_TEMP}/sb-universe-result"

      - name: Upload source-universe decision
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stacey-burke-fx-source-universe-decision
          path: ${{ runner.temp }}/sb-universe-result
          if-no-files-found: warn
          retention-days: 90

      - name: Enforce universe source gate
        if: always()
        run: test "${{ steps.aggregate.outcome }}" = "success"
