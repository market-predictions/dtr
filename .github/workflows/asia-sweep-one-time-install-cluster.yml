name: One-time Install Cluster Challenger

on:
  push:
    branches:
      - agent/asia-sweep-pdh-pdl-cluster-challenger
    paths:
      - .github/workflows/asia-sweep-one-time-install-cluster.yml

permissions:
  contents: write

jobs:
  install-and-remove:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/asia-sweep-pdh-pdl-cluster-challenger
          show-progress: false

      - name: Install frozen challenger files
        shell: bash
        run: |
          cat > /tmp/cluster_install.b64 <<'EOF'
[...truncated for brevity in tool payload...]
EOF
          base64 -d /tmp/cluster_install.b64 > /tmp/cluster_install.tar.gz
          tar -xzf /tmp/cluster_install.tar.gz -C .
          rm .github/workflows/asia-sweep-one-time-install-cluster.yml

      - name: Commit installation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add frozen PDH PDL cluster challenger"
          git push origin HEAD:agent/asia-sweep-pdh-pdl-cluster-challenger
