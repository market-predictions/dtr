name: Format USA500 research scripts

on:
  push:
    branches:
      - agent/usa500-baseline-discovery
    paths:
      - temporary/format_usa500_scripts.trigger
  pull_request:
    paths:
      - temporary/format_usa500_scripts.trigger

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/usa500-baseline-discovery
          fetch-depth: 0
      - name: Apply Ruff formatting and fixes
        run: |
          pipx run --spec ruff==0.15.22 ruff format \
            scripts/run_usa500_baseline_discovery.py \
            scripts/review_usa500_baseline_discovery.py \
            scripts/run_usa500_session_decomposition.py \
            scripts/review_usa500_session_decomposition.py
          pipx run --spec ruff==0.15.22 ruff check --fix --unsafe-fixes \
            scripts/run_usa500_baseline_discovery.py \
            scripts/review_usa500_baseline_discovery.py \
            scripts/run_usa500_session_decomposition.py \
            scripts/review_usa500_session_decomposition.py || true
          pipx run --spec ruff==0.15.22 ruff format \
            scripts/run_usa500_baseline_discovery.py \
            scripts/review_usa500_baseline_discovery.py \
            scripts/run_usa500_session_decomposition.py \
            scripts/review_usa500_session_decomposition.py
      - name: Commit formatted scripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/run_usa500_baseline_discovery.py \
                  scripts/review_usa500_baseline_discovery.py \
                  scripts/run_usa500_session_decomposition.py \
                  scripts/review_usa500_session_decomposition.py
          git rm temporary/format_usa500_scripts.trigger
          git commit -m "Format USA500 research runners"
          git push origin HEAD:agent/usa500-baseline-discovery
