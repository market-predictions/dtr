name: Stoic parallel certification parity

on:
  pull_request:
    branches:
      - agent/stoic-usa500-forward-2015plus
    paths:
      - ".github/workflows/stoic-research-cycle-parallel.yml"
      - "scripts/run_stoic_usa500_partition.py"
      - "scripts/aggregate_stoic_usa500_partitions.py"
      - "scripts/compare_stoic_acceleration_parity.py"
      - "src/stoic_123_lab/research_cache.py"
      - "src/stoic_123_lab/research_runtime.py"
      - "src/stoic_123_lab/cost_repricing.py"
      - "src/stoic_123_lab/reporting.py"
      - "src/stoic_123_lab/usa500_rth_study.py"
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Workflow run containing frozen annual sources and reference evidence
        required: true
        default: "30083576930"

permissions:
  actions: read
  contents: read

concurrency:
  group: stoic-parallel-certification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  partition:
    name: Certify ${{ matrix.partition }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        partition:
          - primary_forward
          - crisis_regime
          - recent_holdout
          - monitoring_2026_ytd
    env:
      SOURCE_RUN_ID: ${{ inputs.source_run_id || '30083576930' }}
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,research]"

      - name: Restore immutable derived cache
        uses: actions/cache@v4
        with:
          path: .research-cache/stoic-usa500
          key: >-
            stoic-usa500-${{ matrix.partition }}-${{ env.SOURCE_RUN_ID }}-
            ${{ hashFiles('strategies/stoic_123/configs/phase1.yaml', 'strategies/stoic_123/configs/usa500_forward_2015plus.yaml') }}

      - name: Download frozen annual sources
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ env.SOURCE_RUN_ID }}
          pattern: stoic-usa500-forward-validation-source-*
          path: private-data
          merge-multiple: true

      - name: Run partition certification
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p partition-output
          /usr/bin/time -f '%e' -o partition-output/wall_seconds.txt \
            python scripts/run_stoic_usa500_partition.py \
              --sources private-data \
              --phase1 strategies/stoic_123/configs/phase1.yaml \
              --design strategies/stoic_123/configs/usa500_forward_2015plus.yaml \
              --partition '${{ matrix.partition }}' \
              --iterations 10000 \
              --cache-dir .research-cache/stoic-usa500 \
              --out partition-output

      - name: Remove raw source data
        if: always()
        run: rm -rf private-data

      - name: Upload compact partition evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stoic-research-partition-${{ matrix.partition }}
          path: partition-output
          retention-days: 14
          if-no-files-found: error

  aggregate:
    needs: partition
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SOURCE_RUN_ID: ${{ inputs.source_run_id || '30083576930' }}
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,research]"

      - name: Download partition evidence
        uses: actions/download-artifact@v4
        with:
          pattern: stoic-research-partition-*
          path: partition-results

      - name: Download frozen reference evidence
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ env.SOURCE_RUN_ID }}
          name: stoic-usa500-forward-2015plus-validation
          path: reference

      - name: Aggregate parallel certification
        run: |
          python scripts/aggregate_stoic_usa500_partitions.py \
            --inputs partition-results \
            --iterations 10000 \
            --out parallel-result

      - name: Enforce frozen evidence parity
        run: |
          python scripts/compare_stoic_acceleration_parity.py \
            --reference reference \
            --observed parallel-result \
            --out parallel-result/parity.json

      - name: Remove downloaded intermediate evidence
        if: always()
        run: rm -rf partition-results reference

      - name: Upload parallel result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stoic-research-cycle-parallel-result
          path: parallel-result
          retention-days: 14
          if-no-files-found: error
