name: Temporary source snapshot

on:
  push:
    branches:
      - agent/roadmap-correction-six-step
    paths:
      - .github/workflows/temporary_source_snapshot.yml
  pull_request:
    paths:
      - .github/workflows/temporary_source_snapshot.yml

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package source and governance files
        run: |
          tar -czf dtr-source-snapshot.tar.gz \
            src scripts tests pyproject.toml README.md STATUS.md ROADMAP.md docs results workpackages claims handovers reviews changelogs changelog 2>/dev/null || \
          tar -czf dtr-source-snapshot.tar.gz src scripts tests pyproject.toml README.md STATUS.md ROADMAP.md docs results workpackages claims handovers reviews
      - uses: actions/upload-artifact@v4
        with:
          name: dtr-source-snapshot-six-step
          path: dtr-source-snapshot.tar.gz
          retention-days: 1
          compression-level: 0
