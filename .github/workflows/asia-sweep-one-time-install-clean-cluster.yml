name: One-time Install Clean Cluster Challenger

on:
  pull_request:
    paths:
      - .github/workflows/asia-sweep-one-time-install-clean-cluster.yml

permissions:
  contents: write

jobs:
  install-and-remove:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          show-progress: false

      - name: Verify and extract package
        run: |
          set -euo pipefail
          echo "d727602b1ede6997d9267f664b9712e94e6138c5d41c863bd71fd8ad5fb26d0c  .cluster_payload/install.tar.gz" | sha256sum -c -
          tar -xzf .cluster_payload/install.tar.gz -C .
          rm -rf .cluster_payload
          rm .github/workflows/asia-sweep-one-time-install-clean-cluster.yml

      - name: Validate installed package
        run: |
          python -m py_compile \
            src/dtr_lab/strategies/asia_sweep/cluster_challenger.py \
            scripts/run_asia_sweep_cluster_challenger.py \
            scripts/aggregate_asia_sweep_cluster_challenger.py \
            strategies/asia_sweep/tests/test_cluster_challenger.py
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          PYTHONPATH=src pytest -c strategies/asia_sweep/pytest.ini \
            strategies/asia_sweep/tests/test_cluster_challenger.py

      - name: Commit installed package
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add frozen PDH PDL cluster challenger"
          git push origin HEAD:${{ github.head_ref }}
