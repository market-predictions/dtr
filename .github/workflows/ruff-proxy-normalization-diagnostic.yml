name: Temporary Ruff Proxy Normalization Diagnostic

on:
  pull_request:
    paths:
      - ".github/workflows/ruff-proxy-normalization-diagnostic.yml"
      - "src/dtr_lab/strategies/asia_sweep/proxy_normalization.py"
      - "strategies/asia_sweep/tests/test_proxy_normalization.py"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          show-progress: false

      - name: Apply pinned Ruff fixes
        run: |
          pipx run ruff==0.15.22 check \
            src/dtr_lab/strategies/asia_sweep/proxy_normalization.py \
            strategies/asia_sweep/tests/test_proxy_normalization.py \
            --fix

      - name: Commit exact Ruff fix
        run: |
          if git diff --quiet; then
            echo "No Ruff changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/dtr_lab/strategies/asia_sweep/proxy_normalization.py \
            strategies/asia_sweep/tests/test_proxy_normalization.py
          git commit -m "Apply pinned Ruff proxy normalization fix"
          git push origin "HEAD:${{ github.head_ref }}"
