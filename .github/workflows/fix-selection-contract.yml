name: Fix selection contract

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/fix-selection-contract.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Apply exact contract fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          selection = Path('src/dtr_lab/research/selection.py')
          text = selection.read_text()
          needle = '            "candidate_id": str(column),\n'
          if text.count(needle) != 1:
              raise SystemExit('candidate id hash line not found exactly once')
          selection.write_text(text.replace(needle, '', 1))

          test = Path('tests/test_integrity.py')
          text = test.read_text()
          old = (
              'def test_public_engine_entry_points_are_integrity_safe() -> None:\n'
              '    assert engine.resample_5m is resample_5m\n'
              '    assert engine.run_backtest is run_backtest\n'
          )
          new = (
              'def test_public_package_entry_points_are_integrity_safe_without_engine_mutation() -> None:\n'
              '    assert resample_5m is integrity.resample_5m\n'
              '    assert run_backtest is integrity.run_backtest\n'
              '    assert engine.resample_5m is not resample_5m\n'
              '    assert engine.run_backtest is not run_backtest\n'
          )
          if text.count(old) != 1:
              raise SystemExit('legacy engine identity test not found exactly once')
          test.write_text(text.replace(old, new, 1))
          PY
          rm -rf .diagnostics
          rm .github/workflows/fix-selection-contract.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Fix explicit execution and duplicate stream contracts"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
