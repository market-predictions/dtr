name: Fix selection contract

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/fix-selection-contract.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Apply exact contract fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          selection = Path('src/dtr_lab/research/selection.py')
          text = selection.read_text()
          old = '''        payload = {
              "candidate_id": str(column),
              "index": [str(value) for value in index_payload],
              "returns": [float(value) for value in matrix[column].to_numpy(float)],
          }
          '''.replace('          ', '')
          new = '''        payload = {
              "index": [str(value) for value in index_payload],
              "returns": [float(value) for value in matrix[column].to_numpy(float)],
          }
          '''.replace('          ', '')
          if text.count(old) != 1:
              raise SystemExit('selection hash block not found exactly once')
          selection.write_text(text.replace(old, new, 1))

          test = Path('tests/test_integrity.py')
          text = test.read_text()
          old = '''def test_public_engine_entry_points_are_integrity_safe() -> None:
              assert engine.resample_5m is resample_5m
              assert engine.run_backtest is run_backtest
          '''.replace('              ', '')
          new = '''def test_public_package_entry_points_are_integrity_safe_without_engine_mutation() -> None:
              assert resample_5m is integrity.resample_5m
              assert run_backtest is integrity.run_backtest
              assert engine.resample_5m is not resample_5m
              assert engine.run_backtest is not run_backtest
          '''.replace('              ', '')
          if text.count(old) != 1:
              raise SystemExit('legacy engine identity test not found exactly once')
          test.write_text(text.replace(old, new, 1))
          PY
          rm -rf .diagnostics
          rm .github/workflows/fix-selection-contract.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Fix explicit execution and duplicate stream contracts"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
