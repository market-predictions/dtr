name: Temporary GBPUSD fast execution

on:
  pull_request:
    paths:
      - .github/workflows/temporary_gbpusd_fast_execution.yml
      - temporary/gbpusd_runners.tar.gz.b64

concurrency:
  group: gbpusd-fast-execution
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/gbpusd-dtr-replication
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download 2022-2025 GBPUSD bid and ask candles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/gbpusd_data
          cat > /tmp/download_gbpusd_fast.py <<'PY'
          from __future__ import annotations

          import csv
          import datetime as dt
          import gzip
          import lzma
          import random
          import struct
          import time
          import urllib.error
          import urllib.request
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from pathlib import Path

          SYMBOL = "GBPUSD"
          RECORD = struct.Struct(">5if")
          DIVISOR = 100000.0
          OUT = Path("/tmp/gbpusd_data")

          def fetch_day(day: dt.date, side: str):
              month = day.month - 1
              url = (
                  f"https://datafeed.dukascopy.com/datafeed/{SYMBOL}/"
                  f"{day.year:04d}/{month:02d}/{day.day:02d}/"
                  f"{side}_candles_min_1.bi5"
              )
              last = None
              for attempt in range(9):
                  try:
                      request = urllib.request.Request(
                          url,
                          headers={"User-Agent": "DTR-private-research/1.0"},
                      )
                      with urllib.request.urlopen(request, timeout=90) as response:
                          raw = response.read()
                      if not raw:
                          return day, [], "empty"
                      payload = lzma.decompress(raw)
                      if len(payload) % RECORD.size:
                          raise ValueError(f"record-size mismatch {len(payload)}")
                      midnight = dt.datetime.combine(
                          day, dt.time(), tzinfo=dt.timezone.utc
                      )
                      rows = []
                      for offset in range(0, len(payload), RECORD.size):
                          seconds, open_, high, low, close, volume = RECORD.unpack_from(
                              payload, offset
                          )
                          timestamp = midnight + dt.timedelta(seconds=seconds)
                          rows.append(
                              (
                                  int(timestamp.timestamp() * 1000),
                                  open_ / DIVISOR,
                                  high / DIVISOR,
                                  low / DIVISOR,
                                  close / DIVISOR,
                                  float(volume),
                              )
                          )
                      return day, rows, "ok"
                  except urllib.error.HTTPError as error:
                      if error.code == 404:
                          return day, [], "404"
                      last = f"HTTP {error.code}"
                  except Exception as error:  # noqa: BLE001
                      last = repr(error)
                  time.sleep(min(120, 2 * (2**attempt)) + random.random())
              raise RuntimeError(f"{day} {side}: {last}")

          for year in range(2022, 2026):
              start = dt.date(year, 1, 1)
              end = dt.date(year + 1, 1, 1)
              days = []
              current = start
              while current < end:
                  days.append(current)
                  current += dt.timedelta(days=1)

              audit = [
                  f"symbol={SYMBOL}",
                  f"year={year}",
                  f"calendar_days={len(days)}",
                  f"divisor={DIVISOR}",
              ]
              for side in ("BID", "ASK"):
                  results = {}
                  statuses = {}
                  with ThreadPoolExecutor(max_workers=24) as pool:
                      futures = {
                          pool.submit(fetch_day, day, side): day for day in days
                      }
                      for future in as_completed(futures):
                          day, rows, status = future.result()
                          results[day] = rows
                          statuses[status] = statuses.get(status, 0) + 1

                  path = OUT / f"gbpusd_m1_{side.lower()}_{year}.csv.gz"
                  row_count = 0
                  with gzip.open(path, "wt", newline="", encoding="utf-8") as handle:
                      writer = csv.writer(handle)
                      writer.writerow(
                          ["timestamp", "open", "high", "low", "close", "volume"]
                      )
                      for day in sorted(results):
                          writer.writerows(results[day])
                          row_count += len(results[day])
                  audit.append(f"{side.lower()}_rows={row_count}")
                  for key, value in sorted(statuses.items()):
                      audit.append(f"{side.lower()}_status_{key}={value}")

              (OUT / f"gbpusd_m1_{year}_audit.txt").write_text(
                  "\n".join(audit) + "\n", encoding="utf-8"
              )
              print("\n".join(audit), flush=True)
          PY
          python /tmp/download_gbpusd_fast.py
          sha256sum /tmp/gbpusd_data/*.csv.gz \
            | tee /tmp/gbpusd_data/annual_sha256.txt

      - name: Materialize and validate runners
        shell: bash
        run: |
          set -euo pipefail
          base64 -d temporary/gbpusd_runners.tar.gz.b64 | tar -xz -C scripts
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/review_gbpusd_replication.py')
          text = path.read_text()
          old = '    stage1b = pd.read_csv(args.results / "stage1b_session_decomposition.csv")'
          new = (
              '    try:\n'
              '        stage1b = pd.read_csv(args.results / "stage1b_session_decomposition.csv")\n'
              '    except pd.errors.EmptyDataError:\n'
              '        stage1b = pd.DataFrame()'
          )
          if old not in text:
              raise SystemExit('reviewer patch target not found')
          path.write_text(text.replace(old, new, 1))
          PY
          python -m py_compile \
            scripts/run_gbpusd_replication.py \
            scripts/review_gbpusd_replication.py

      - name: Install research environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install matplotlib tabulate

      - name: Run frozen study and independent review
        run: |
          python scripts/run_gbpusd_replication.py \
            --input-dir /tmp/gbpusd_data \
            --out /tmp/gbpusd_results \
            --iterations 20000
          python scripts/review_gbpusd_replication.py \
            --results /tmp/gbpusd_results \
            --out /tmp/gbpusd_review \
            --iterations 20000

      - name: Commit compact evidence only
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p results/2026-07-23/gbpusd docs reviews changelogs handovers
          cp /tmp/gbpusd_results/stage1_calendar_factorial.csv results/2026-07-23/gbpusd/
          cp /tmp/gbpusd_results/stage1_paired_bootstrap.csv results/2026-07-23/gbpusd/
          cp /tmp/gbpusd_results/stage1b_session_decomposition.csv results/2026-07-23/gbpusd/
          cp /tmp/gbpusd_results/spread_summary.csv results/2026-07-23/gbpusd/
          cp /tmp/gbpusd_results/data_audit.json results/2026-07-23/gbpusd/
          cp /tmp/gbpusd_results/decision.json results/2026-07-23/gbpusd/
          cp /tmp/gbpusd_results/artifact_hashes.json results/2026-07-23/gbpusd/
          cp /tmp/gbpusd_results/charts/*.png results/2026-07-23/gbpusd/
          cp /tmp/gbpusd_review/independent_review.json results/2026-07-23/gbpusd/
          cp /tmp/gbpusd_review/independent_metrics.csv results/2026-07-23/gbpusd/
          cp /tmp/gbpusd_review/independent_bootstrap.csv results/2026-07-23/gbpusd/
          cp /tmp/gbpusd_results/GBPUSD_DTR_REPLICATION_RESEARCH_2026-07-23.md docs/

          python - <<'PY'
          import json
          from pathlib import Path
          results = Path('results/2026-07-23/gbpusd')
          decision = json.loads((results / 'decision.json').read_text())
          review = json.loads((results / 'independent_review.json').read_text())
          Path('reviews/DTR-FX-WP-20260723-22-independent-review.md').write_text(
              '# Independent review — DTR-FX-WP-20260723-22\n\n'
              f"- Conclusion: `{review['conclusion']}`\n"
              f"- Research decision: `{decision['decision']}`\n"
              '- Metrics, spread handling, selection gates and roadmap ordering were independently reconstructed.\n',
              encoding='utf-8',
          )
          Path('changelogs/DTR-FX-WP-20260723-22.md').write_text(
              '# Changelog — DTR-FX-WP-20260723-22\n\n'
              '## v0.5.0-fx.1 — 2026-07-23\n\n'
              '- Added temporary Dukascopy GBPUSD bid/ask acquisition.\n'
              '- Added midpoint/spread qualification and frozen DTR replication.\n'
              '- Added independent review and compact evidence.\n'
              f"- Decision: `{decision['decision']}`.\n",
              encoding='utf-8',
          )
          Path('handovers/DTR-FX-WP-20260723-22.md').write_text(
              '# Handover — DTR-FX-WP-20260723-22\n\n'
              f"Decision: `{decision['decision']}`\n\n"
              f"Selected arm: `{decision.get('selected_arm')}`\n\n"
              'Raw GBPUSD data was not committed and must not be redistributed.\n',
              encoding='utf-8',
          )
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/run_gbpusd_replication.py \
                  scripts/review_gbpusd_replication.py \
                  results/2026-07-23/gbpusd \
                  docs/GBPUSD_DTR_REPLICATION_RESEARCH_2026-07-23.md \
                  reviews/DTR-FX-WP-20260723-22-independent-review.md \
                  changelogs/DTR-FX-WP-20260723-22.md \
                  handovers/DTR-FX-WP-20260723-22.md
          git commit -m "Complete GBPUSD DTR replication"
          git push origin HEAD:agent/gbpusd-dtr-replication

      - name: Remove temporary data
        if: always()
        run: rm -rf /tmp/gbpusd_data /tmp/gbpusd_results /tmp/gbpusd_review
