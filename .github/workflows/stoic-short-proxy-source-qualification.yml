name: Stoic short unseen proxy source qualification

on:
  push:
    branches:
      - agent/stoic-short-unseen-proxy-validation
    paths:
      - ".github/workflows/stoic-short-proxy-source-qualification.yml"
      - "scripts/acquire_stoic_usatech_partition.py"
      - "strategies/stoic_123/configs/short_unseen_proxy_validation.yaml"
  pull_request:
    branches:
      - agent/stoic-nq-long-only-validation
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/stoic-short-proxy-source-qualification.yml"
      - "scripts/acquire_stoic_usatech_partition.py"
      - "strategies/stoic_123/configs/short_unseen_proxy_validation.yaml"
  workflow_dispatch:

concurrency:
  group: stoic-short-proxy-source-qualification-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qualify:
    name: Qualify USATECH ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - {label: 2015, start: 2015-01-01, end: 2016-01-01}
          - {label: 2016, start: 2016-01-01, end: 2017-01-01}
          - {label: 2017, start: 2017-01-01, end: 2018-01-01}
          - {label: 2018, start: 2018-01-01, end: 2019-01-01}
          - {label: 2019, start: 2019-01-01, end: 2020-01-01}
          - {label: 2020, start: 2020-01-01, end: 2021-01-01}
          - {label: 2021, start: 2021-01-01, end: 2022-01-01}
          - {label: 2026_YTD, start: 2026-01-01, end: 2026-07-23}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff acquisition script
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.14.10
          ruff check scripts/acquire_stoic_usatech_partition.py

      - name: Acquire and audit fixed partition
        run: |
          python scripts/acquire_stoic_usatech_partition.py \
            --start '${{ matrix.start }}' \
            --end '${{ matrix.end }}' \
            --label '${{ matrix.label }}' \
            --workers 8

      - name: Upload private source qualification artifact
        uses: actions/upload-artifact@v4
        with:
          name: stoic-usatech-source-${{ matrix.label }}
          path: |
            usatechidxusd_m1_bid_${{ matrix.label }}.csv.gz
            usatechidxusd_m1_bid_${{ matrix.label }}_audit.json
          retention-days: 2
          compression-level: 0
          if-no-files-found: error
