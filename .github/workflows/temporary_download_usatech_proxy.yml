name: Temporary USATECH proxy diagnostic

on:
  pull_request:
    paths:
      - .github/workflows/temporary_download_usatech_proxy.yml
      - temporary-usatech-download-trigger.txt
  push:
    branches:
      - agent/roadmap-correction-six-step
    paths:
      - .github/workflows/temporary_download_usatech_proxy.yml
      - temporary-usatech-download-trigger.txt

permissions:
  contents: read

jobs:
  diagnose:
    name: Diagnose USATECH BID 2022
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run downloader and preserve raw log
        shell: bash
        run: |
          set +e
          mkdir -p temporary-data
          npx --yes dukascopy-node@1.49.0 \
            -i usatechidxusd \
            -from 2022-01-01 \
            -to 2023-01-01 \
            -t m1 -p bid -v -vu units -fl -f csv \
            -dir temporary-data \
            -fn usatechidxusd_m1_bid_2022 \
            -bs 5 -bp 1000 -r 10 -rp 3000 \
            > temporary-data/download.log 2>&1
          STATUS=$?
          echo "$STATUS" > temporary-data/exit_status.txt
          cat temporary-data/download.log
          exit "$STATUS"
      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: usatech-download-diagnostic-2022
          path: temporary-data/*
          retention-days: 1
          if-no-files-found: error
