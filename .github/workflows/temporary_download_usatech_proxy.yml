name: Temporary USATECH proxy download

on:
  pull_request:
    paths:
      - .github/workflows/temporary_download_usatech_proxy.yml
      - temporary-usatech-download-trigger.txt
  push:
    branches:
      - agent/roadmap-correction-six-step
    paths:
      - .github/workflows/temporary_download_usatech_proxy.yml
      - temporary-usatech-download-trigger.txt

permissions:
  contents: read

jobs:
  bid:
    name: USATECH M1 BID ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - {label: 2022, from: 2022-01-01, to: 2023-01-01}
          - {label: 2023, from: 2023-01-01, to: 2024-01-01}
          - {label: 2024, from: 2024-01-01, to: 2025-01-01}
          - {label: 2025, from: 2025-01-01, to: 2026-01-01}
          - {label: 2026_YTD, from: 2026-01-01, to: 2026-07-23}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Download bid candles with auditable flat placeholders
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p temporary-data
          npx --yes dukascopy-node@1.49.0 \
            -i usatechidxusd \
            -from "${{ matrix.from }}" \
            -to "${{ matrix.to }}" \
            -t m1 -p bid -v -vu units -fl -f csv \
            -dir temporary-data \
            -fn "usatechidxusd_m1_bid_${{ matrix.label }}" \
            -bs 20 -bp 300 -r 6 -rp 1500
      - name: Audit and compress
        shell: bash
        run: |
          set -euo pipefail
          CSV="$(find temporary-data -maxdepth 1 -type f -name '*.csv' -print -quit)"
          test -n "$CSV"
          wc -l "$CSV" | tee temporary-data/line_count.txt
          head -n 3 "$CSV" | tee temporary-data/head.txt
          tail -n 3 "$CSV" | tee temporary-data/tail.txt
          sha256sum "$CSV" | tee temporary-data/sha256.txt
          gzip -9 "$CSV"
      - uses: actions/upload-artifact@v4
        with:
          name: usatechidxusd-m1-bid-${{ matrix.label }}
          path: temporary-data/*
          retention-days: 1
          compression-level: 0
          if-no-files-found: error

  ask:
    name: USATECH M1 ASK ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - {label: 2022, from: 2022-01-01, to: 2023-01-01}
          - {label: 2023, from: 2023-01-01, to: 2024-01-01}
          - {label: 2024, from: 2024-01-01, to: 2025-01-01}
          - {label: 2025, from: 2025-01-01, to: 2026-01-01}
          - {label: 2026_YTD, from: 2026-01-01, to: 2026-07-23}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Download ask candles with auditable flat placeholders
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p temporary-data
          npx --yes dukascopy-node@1.49.0 \
            -i usatechidxusd \
            -from "${{ matrix.from }}" \
            -to "${{ matrix.to }}" \
            -t m1 -p ask -v -vu units -fl -f csv \
            -dir temporary-data \
            -fn "usatechidxusd_m1_ask_${{ matrix.label }}" \
            -bs 20 -bp 300 -r 6 -rp 1500
      - name: Audit and compress
        shell: bash
        run: |
          set -euo pipefail
          CSV="$(find temporary-data -maxdepth 1 -type f -name '*.csv' -print -quit)"
          test -n "$CSV"
          wc -l "$CSV" | tee temporary-data/line_count.txt
          head -n 3 "$CSV" | tee temporary-data/head.txt
          tail -n 3 "$CSV" | tee temporary-data/tail.txt
          sha256sum "$CSV" | tee temporary-data/sha256.txt
          gzip -9 "$CSV"
      - uses: actions/upload-artifact@v4
        with:
          name: usatechidxusd-m1-ask-${{ matrix.label }}
          path: temporary-data/*
          retention-days: 1
          compression-level: 0
          if-no-files-found: error
