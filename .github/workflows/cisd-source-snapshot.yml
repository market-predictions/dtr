name: CISD source snapshot

on:
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    if: github.head_ref == 'agent/nq-cisd-ablation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Archive tracked source
        run: git archive --format=tar.gz --output=dtr-cisd-source.tar.gz HEAD
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: dtr-cisd-source
          path: dtr-cisd-source.tar.gz
          if-no-files-found: error
          retention-days: 1
