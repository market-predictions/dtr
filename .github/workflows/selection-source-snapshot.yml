name: Selection source snapshot

on:
  push:
    branches:
      - agent/nq-selection-robustness
    paths:
      - .github/workflows/selection-source-snapshot.yml

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build source snapshot
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=.github/workflows/selection-source-snapshot.yml \
            -czf dtr-selection-source.tar.gz .
          sha256sum dtr-selection-source.tar.gz > dtr-selection-source.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: dtr-selection-source
          path: |
            dtr-selection-source.tar.gz
            dtr-selection-source.sha256
          if-no-files-found: error
          retention-days: 2
