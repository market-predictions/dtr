name: Publish baseline reset evidence

on:
  pull_request:

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'agent/nq-baseline-validity-reset'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/nq-baseline-validity-reset
          fetch-depth: 0
      - name: Reconstruct and verify evidence
        run: |
          cat .baseline-reset-results.part00 \
              .baseline-reset-results.part01 \
              .baseline-reset-results.part02 \
              .baseline-reset-results.part03 \
              .baseline-reset-results.part04 \
              .baseline-reset-results.part05 \
              .baseline-reset-results.part06 \
            | base64 --decode > .baseline-reset-results.tar.xz
          echo "b5f4b9d1d532ca48ab66c77c7185bbd0bb5d8c8610a2eceb39d85dd3b6920d5e  .baseline-reset-results.tar.xz" | sha256sum --check
      - name: Extract and clean
        run: |
          tar -xJf .baseline-reset-results.tar.xz
          rm .baseline-reset-results.tar.xz
          rm .baseline-reset-results.part*
          rm .github/workflows/publish-baseline-reset-results.yml
      - name: Commit evidence
        run: |
          git config user.name "dtr-research-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Publish NQ baseline validity evidence"
          git push origin HEAD:agent/nq-baseline-validity-reset
