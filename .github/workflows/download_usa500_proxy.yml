name: Temporary USA500 proxy download

on:
  push:
    branches:
      - agent/usa500-dukascopy-download
    paths:
      - .github/workflows/download_usa500_proxy.yml
      - temporary-download-trigger.txt
  pull_request:
    paths:
      - .github/workflows/download_usa500_proxy.yml
      - temporary-download-trigger.txt

permissions:
  contents: read

jobs:
  download:
    name: USA500 M1 ASK ${{ matrix.year }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - year: 2022
            next_year: 2023
          - year: 2023
            next_year: 2024
          - year: 2024
            next_year: 2025
          - year: 2025
            next_year: 2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download one-minute ask candles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p temporary-data
          npx --yes dukascopy-node@1.49.0 \
            -i usa500idxusd \
            -from "${{ matrix.year }}-01-01" \
            -to "${{ matrix.next_year }}-01-01" \
            -t m1 \
            -p ask \
            -v \
            -vu units \
            -fl \
            -f csv \
            -dir temporary-data \
            -fn "usa500idxusd_m1_ask_${{ matrix.year }}" \
            -bs 20 \
            -bp 250 \
            -r 5 \
            -rp 1000

      - name: Audit and compress
        shell: bash
        run: |
          set -euo pipefail
          CSV="$(find temporary-data -maxdepth 1 -type f -name '*.csv' -print -quit)"
          test -n "$CSV"
          echo "file=$CSV" | tee temporary-data/metadata.txt
          echo "bytes=$(stat -c '%s' "$CSV")" | tee -a temporary-data/metadata.txt
          echo "lines=$(wc -l < "$CSV")" | tee -a temporary-data/metadata.txt
          echo "first_rows:" | tee -a temporary-data/metadata.txt
          head -n 3 "$CSV" | tee -a temporary-data/metadata.txt
          echo "last_rows:" | tee -a temporary-data/metadata.txt
          tail -n 3 "$CSV" | tee -a temporary-data/metadata.txt
          sha256sum "$CSV" | tee temporary-data/sha256.txt
          gzip -9 "$CSV"

      - name: Upload temporary data artifact
        uses: actions/upload-artifact@v4
        with:
          name: usa500idxusd-m1-ask-${{ matrix.year }}
          path: |
            temporary-data/*.csv.gz
            temporary-data/metadata.txt
            temporary-data/sha256.txt
          retention-days: 1
          compression-level: 0
          if-no-files-found: error
