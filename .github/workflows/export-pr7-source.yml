name: Export PR7 source

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/export-pr7-source.yml

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build source archive
        run: |
          set -euo pipefail
          tar --exclude=.git -czf /tmp/dtr-pr7-source.tar.gz .
          sha256sum /tmp/dtr-pr7-source.tar.gz > /tmp/dtr-pr7-source.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: dtr-pr7-source
          path: |
            /tmp/dtr-pr7-source.tar.gz
            /tmp/dtr-pr7-source.sha256
          retention-days: 1
