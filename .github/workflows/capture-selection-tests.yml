name: Capture selection test failure

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/capture-selection-tests.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Capture pytest output
        run: |
          set +e
          python -m pip install -e . pytest > /tmp/install.txt 2>&1
          PYTHONPATH=src pytest -q > /tmp/pytest.txt 2>&1
          status=$?
          set -e
          mkdir -p .diagnostics
          {
            echo "pytest_exit_status=$status"
            cat /tmp/pytest.txt
          } > .diagnostics/selection-pytest.txt
          rm .github/workflows/capture-selection-tests.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture selection test failure"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
