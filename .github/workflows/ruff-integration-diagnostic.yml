name: Temporary Ruff Integration Diagnostic

on:
  pull_request:
    paths:
      - ".github/workflows/ruff-integration-diagnostic.yml"
      - "src/dtr_lab/strategies/asia_sweep/integration.py"
      - "strategies/asia_sweep/tests/test_integration.py"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Apply pinned Ruff fixes
        run: |
          pipx run ruff==0.15.22 check \
            src/dtr_lab/strategies/asia_sweep/integration.py \
            strategies/asia_sweep/tests/test_integration.py \
            --fix
          git diff -- \
            src/dtr_lab/strategies/asia_sweep/integration.py \
            strategies/asia_sweep/tests/test_integration.py \
            > ruff-integration-fix.diff
          cp src/dtr_lab/strategies/asia_sweep/integration.py \
            integration.ruff-fixed.py
          cp strategies/asia_sweep/tests/test_integration.py \
            test_integration.ruff-fixed.py

      - name: Upload exact Ruff fix
        uses: actions/upload-artifact@v4
        with:
          name: ruff-integration-fix
          path: |
            ruff-integration-fix.diff
            integration.ruff-fixed.py
            test_integration.ruff-fixed.py
          if-no-files-found: error
          retention-days: 1
