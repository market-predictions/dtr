name: Publish selection robustness package

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/publish-selection-robustness.yml
      - .selection/**

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Verify staged packages
        run: |
          set -euo pipefail
          echo "de8fb9a0aca93c7433f94aa6a438f72b5ce4ace13404c951c81dfeb553c3513f  .selection/source.tar.gz" | sha256sum --check --strict
          echo "d401fcae44109337d3e5b60fc7453512ab3d481798a612eaf1e42a6c30dd3bbb  .selection/evidence.tar.gz" | sha256sum --check --strict
      - name: Extract reviewed package
        run: |
          set -euo pipefail
          tar -xzf .selection/source.tar.gz -C .
          tar -xzf .selection/evidence.tar.gz -C .
          rm -rf .selection
          rm -f .github/workflows/publish-selection-robustness.yml
      - name: Commit reviewed package
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Complete NQ selection robustness review"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
