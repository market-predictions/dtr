name: Asia Sweep Dukascopy Proxy Data

on:
  pull_request:
    paths:
      - ".github/workflows/asia-sweep-dukascopy-proxy-data.yml"
      - "scripts/download_dukascopy_proxy_chunks.py"
      - "scripts/prepare_dukascopy_proxy_data.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        instrument:
          - usatechidxusd
          - usa500idxusd

    env:
      DUKASCOPY_NODE_VERSION: "1.49.0"
      DATE_FROM: "2022-12-26"
      DATE_TO: "2025-12-12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned downloader
        run: npm install --no-save dukascopy-node@${DUKASCOPY_NODE_VERSION}

      - name: Download monthly proxy chunks
        run: |
          python scripts/download_dukascopy_proxy_chunks.py \
            --instrument "${{ matrix.instrument }}" \
            --date-from "${DATE_FROM}" \
            --date-to "${DATE_TO}" \
            --package-version "${DUKASCOPY_NODE_VERSION}" \
            --output-root "raw/${{ matrix.instrument }}" \
            --cache-root ".dukascopy-cache/${{ matrix.instrument }}" \
            --log-path "${{ matrix.instrument }}-download.log" \
            --max-attempts 5

      - name: Upload raw chunks
        uses: actions/upload-artifact@v4
        with:
          name: raw-${{ matrix.instrument }}
          path: raw/${{ matrix.instrument }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload acquisition diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-${{ matrix.instrument }}
          path: ${{ matrix.instrument }}-download.log
          if-no-files-found: warn
          retention-days: 7

  normalize:
    needs: acquire
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DUKASCOPY_NODE_VERSION: "1.49.0"
      DATE_FROM: "2022-12-26"
      DATE_TO: "2025-12-12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install preparation dependencies
        run: python -m pip install --upgrade pandas numpy

      - name: Download NQ proxy chunks
        uses: actions/download-artifact@v4
        with:
          name: raw-usatechidxusd
          path: raw/usatechidxusd

      - name: Download ES proxy chunks
        uses: actions/download-artifact@v4
        with:
          name: raw-usa500idxusd
          path: raw/usa500idxusd

      - name: Normalize and checksum proxies
        run: |
          python scripts/prepare_dukascopy_proxy_data.py \
            --raw-root raw \
            --output-root prepared \
            --date-from "${DATE_FROM}" \
            --date-to "${DATE_TO}" \
            --package-version "${DUKASCOPY_NODE_VERSION}" \
            | tee proxy-preparation.log

      - name: Upload proxy datasets and provenance
        uses: actions/upload-artifact@v4
        with:
          name: asia-sweep-dukascopy-proxies
          path: |
            prepared/*
            proxy-preparation.log
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload normalization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-normalization
          path: proxy-preparation.log
          if-no-files-found: warn
          retention-days: 7
