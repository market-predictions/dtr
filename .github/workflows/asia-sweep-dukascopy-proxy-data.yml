name: Asia Sweep Dukascopy Proxy Data

on:
  pull_request:
    paths:
      - ".github/workflows/asia-sweep-dukascopy-proxy-data.yml"
      - "scripts/prepare_dukascopy_proxy_data.py"
      - "strategies/asia_sweep/governance/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acquire-and-qualify:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      DUKASCOPY_NODE_VERSION: "1.49.0"
      DATE_FROM: "2022-12-26"
      DATE_TO: "2025-12-12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python preparation dependencies
        run: python -m pip install --upgrade pandas numpy

      - name: Download NQ proxy from Dukascopy
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p raw/usatechidxusd
          npx --yes dukascopy-node@${DUKASCOPY_NODE_VERSION} \
            -i usatechidxusd \
            -from "${DATE_FROM}" \
            -to "${DATE_TO}" \
            -t m1 \
            -p bid \
            -utc 0 \
            -v \
            -vu units \
            -fl \
            -f csv \
            -df iso \
            -dir raw/usatechidxusd \
            -bs 10 \
            -bp 1000 \
            -r 5 \
            -re \
            -rp 2000 \
            2>&1 | tee usatechidxusd-download.log

      - name: Download ES proxy from Dukascopy
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p raw/usa500idxusd
          npx --yes dukascopy-node@${DUKASCOPY_NODE_VERSION} \
            -i usa500idxusd \
            -from "${DATE_FROM}" \
            -to "${DATE_TO}" \
            -t m1 \
            -p bid \
            -utc 0 \
            -v \
            -vu units \
            -fl \
            -f csv \
            -df iso \
            -dir raw/usa500idxusd \
            -bs 10 \
            -bp 1000 \
            -r 5 \
            -re \
            -rp 2000 \
            2>&1 | tee usa500idxusd-download.log

      - name: Normalize and checksum proxies
        run: |
          python scripts/prepare_dukascopy_proxy_data.py \
            --raw-root raw \
            --output-root prepared \
            --date-from "${DATE_FROM}" \
            --date-to "${DATE_TO}" \
            --package-version "${DUKASCOPY_NODE_VERSION}" \
            | tee proxy-preparation.log

      - name: Upload proxy datasets and provenance
        uses: actions/upload-artifact@v4
        with:
          name: asia-sweep-dukascopy-proxies
          path: |
            prepared/*
            *-download.log
            proxy-preparation.log
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
