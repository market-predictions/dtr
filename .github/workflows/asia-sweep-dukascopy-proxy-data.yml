# Frozen static BI5 transport; no strategy P&L in this workflow.
name: Asia Sweep Dukascopy Proxy Data

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/asia-sweep-dukascopy-proxy-data.yml"
      - "scripts/download_dukascopy_static_proxy.py"
      - "scripts/prepare_dukascopy_proxy_data.py"
  workflow_dispatch:

concurrency:
  group: asia-sweep-dukascopy-proxy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - instrument_id: usatechidxusd
            symbol: USATECHIDXUSD
            label: "2022"
            start: "2022-01-01"
            end: "2023-01-01"
          - instrument_id: usatechidxusd
            symbol: USATECHIDXUSD
            label: "2023"
            start: "2023-01-01"
            end: "2024-01-01"
          - instrument_id: usatechidxusd
            symbol: USATECHIDXUSD
            label: "2024"
            start: "2024-01-01"
            end: "2025-01-01"
          - instrument_id: usatechidxusd
            symbol: USATECHIDXUSD
            label: "2025"
            start: "2025-01-01"
            end: "2026-01-01"
          - instrument_id: usa500idxusd
            symbol: USA500IDXUSD
            label: "2022"
            start: "2022-01-01"
            end: "2023-01-01"
          - instrument_id: usa500idxusd
            symbol: USA500IDXUSD
            label: "2023"
            start: "2023-01-01"
            end: "2024-01-01"
          - instrument_id: usa500idxusd
            symbol: USA500IDXUSD
            label: "2024"
            start: "2024-01-01"
            end: "2025-01-01"
          - instrument_id: usa500idxusd
            symbol: USA500IDXUSD
            label: "2025"
            start: "2025-01-01"
            end: "2026-01-01"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download static daily M1 bid candles
        run: |
          python scripts/download_dukascopy_static_proxy.py \
            --symbol "${{ matrix.symbol }}" \
            --instrument-id "${{ matrix.instrument_id }}" \
            --start "${{ matrix.start }}" \
            --end "${{ matrix.end }}" \
            --label "${{ matrix.label }}" \
            --output-directory \
              "raw/${{ matrix.instrument_id }}/${{ matrix.label }}" \
            --divisor 1000 \
            --workers 4
          sha256sum \
            raw/${{ matrix.instrument_id }}/${{ matrix.label }}/*.csv.gz \
            | tee -a \
              raw/${{ matrix.instrument_id }}/${{ matrix.label }}/*_audit.txt

      - name: Upload raw yearly slice
        uses: actions/upload-artifact@v4
        with:
          name: raw-${{ matrix.instrument_id }}-${{ matrix.label }}
          path: raw
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  normalize:
    needs: acquire
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install preparation dependencies
        run: python -m pip install --upgrade pandas numpy

      - name: Download all yearly slices
        uses: actions/download-artifact@v4
        with:
          pattern: raw-*
          path: raw
          merge-multiple: true

      - name: Normalize and checksum proxies
        run: |
          python scripts/prepare_dukascopy_proxy_data.py \
            --raw-root raw \
            --output-root prepared \
            --date-from "2022-01-01" \
            --date-to "2026-01-01" \
            --package-version "static-bi5-v1" \
            | tee proxy-preparation.log

      - name: Upload proxy datasets and provenance
        uses: actions/upload-artifact@v4
        with:
          name: asia-sweep-dukascopy-proxies
          path: |
            prepared/*
            proxy-preparation.log
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload normalization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-normalization
          path: proxy-preparation.log
          if-no-files-found: warn
          retention-days: 7
