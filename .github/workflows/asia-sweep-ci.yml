name: Asia Sweep CI

on:
  pull_request:
    paths:
      - ".github/workflows/asia-sweep-ci.yml"
      - "scripts/run_asia_sweep_manifest.py"
      - "scripts/download_dukascopy_static_proxy.py"
      - "scripts/prepare_dukascopy_proxy_data.py"
      - "src/dtr_lab/strategies/**"
      - "strategies/asia_sweep/**"
  workflow_dispatch:

concurrency:
  group: asia-sweep-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  isolated-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run isolated Asia Sweep tests
        id: asia_tests
        shell: bash
        run: |
          set +e
          PYTHONPATH=src pytest -c strategies/asia_sweep/pytest.ini \
            > asia-pytest-report.txt 2>&1
          status=$?
          cat asia-pytest-report.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Asia Sweep pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asia-pytest-report-${{ matrix.python-version }}
          path: asia-pytest-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Asia Sweep test gate
        run: test "${{ steps.asia_tests.outputs.exit_code }}" = "0"

  proxy-acquire:
    if: startsWith(github.head_ref, 'agent/asia-sweep-dukascopy-proxy-registration')
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - instrument_id: usatechidxusd
            symbol: USATECHIDXUSD
            label: "2022"
            start: "2022-01-01"
            end: "2023-01-01"
          - instrument_id: usatechidxusd
            symbol: USATECHIDXUSD
            label: "2023"
            start: "2023-01-01"
            end: "2024-01-01"
          - instrument_id: usatechidxusd
            symbol: USATECHIDXUSD
            label: "2024"
            start: "2024-01-01"
            end: "2025-01-01"
          - instrument_id: usatechidxusd
            symbol: USATECHIDXUSD
            label: "2025"
            start: "2025-01-01"
            end: "2026-01-01"
          - instrument_id: usa500idxusd
            symbol: USA500IDXUSD
            label: "2022"
            start: "2022-01-01"
            end: "2023-01-01"
          - instrument_id: usa500idxusd
            symbol: USA500IDXUSD
            label: "2023"
            start: "2023-01-01"
            end: "2024-01-01"
          - instrument_id: usa500idxusd
            symbol: USA500IDXUSD
            label: "2024"
            start: "2024-01-01"
            end: "2025-01-01"
          - instrument_id: usa500idxusd
            symbol: USA500IDXUSD
            label: "2025"
            start: "2025-01-01"
            end: "2026-01-01"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download static daily M1 bid candles
        run: |
          python scripts/download_dukascopy_static_proxy.py \
            --symbol "${{ matrix.symbol }}" \
            --instrument-id "${{ matrix.instrument_id }}" \
            --start "${{ matrix.start }}" \
            --end "${{ matrix.end }}" \
            --label "${{ matrix.label }}" \
            --output-directory \
              "raw/${{ matrix.instrument_id }}/${{ matrix.label }}" \
            --divisor 1000 \
            --workers 4
          sha256sum \
            raw/${{ matrix.instrument_id }}/${{ matrix.label }}/*.csv.gz \
            | tee -a \
              raw/${{ matrix.instrument_id }}/${{ matrix.label }}/*_audit.txt

      - name: Upload raw yearly slice
        uses: actions/upload-artifact@v4
        with:
          name: raw-${{ matrix.instrument_id }}-${{ matrix.label }}
          path: raw
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  proxy-normalize:
    if: startsWith(github.head_ref, 'agent/asia-sweep-dukascopy-proxy-registration')
    needs: proxy-acquire
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install preparation dependencies
        run: python -m pip install --upgrade pandas numpy

      - name: Download all yearly slices
        uses: actions/download-artifact@v4
        with:
          pattern: raw-*
          path: raw
          merge-multiple: true

      - name: Normalize and checksum proxies
        run: |
          python scripts/prepare_dukascopy_proxy_data.py \
            --raw-root raw \
            --output-root prepared \
            --date-from "2022-01-01" \
            --date-to "2026-01-01" \
            --package-version "static-bi5-v1" \
            | tee proxy-preparation.log

      - name: Upload proxy datasets and provenance
        uses: actions/upload-artifact@v4
        with:
          name: asia-sweep-dukascopy-proxies
          path: |
            prepared/*
            proxy-preparation.log
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload normalization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-normalization
          path: proxy-preparation.log
          if-no-files-found: warn
          retention-days: 7
