name: Asia Sweep CI

on:
  pull_request:
    paths:
      - ".github/workflows/asia-sweep-ci.yml"
      - "scripts/run_asia_sweep_manifest.py"
      - "src/dtr_lab/strategies/**"
      - "strategies/asia_sweep/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  isolated-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate Ruff fix preview
        if: matrix.python-version == '3.11'
        shell: bash
        run: |
          ruff check --fix --diff strategies/asia_sweep/tests/test_data.py \
            > asia-ruff-fix.diff 2>&1 || true
          cat asia-ruff-fix.diff

      - name: Upload Ruff fix preview
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: asia-ruff-fix-preview
          path: asia-ruff-fix.diff
          if-no-files-found: error
          retention-days: 7

      - name: Run isolated Asia Sweep tests
        id: asia_tests
        shell: bash
        run: |
          set +e
          PYTHONPATH=src pytest -c strategies/asia_sweep/pytest.ini \
            > asia-pytest-report.txt 2>&1
          status=$?
          cat asia-pytest-report.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Asia Sweep pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asia-pytest-report-${{ matrix.python-version }}
          path: asia-pytest-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Asia Sweep test gate
        run: test "${{ steps.asia_tests.outputs.exit_code }}" = "0"
