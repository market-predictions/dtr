name: Patch GBPUSD transport parallelism

on:
  push:
    branches:
      - agent/gbpusd-dtr-replication
    paths:
      - .github/workflows/temporary_patch_gbpusd_transport.yml
      - temporary/patch_gbpusd_transport.trigger
  pull_request:
    paths:
      - .github/workflows/temporary_patch_gbpusd_transport.yml
      - temporary/patch_gbpusd_transport.trigger

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/gbpusd-dtr-replication
          fetch-depth: 0
      - name: Apply proven static-feed concurrency
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/temporary_gbpusd_acquisition.yml')
          text = path.read_text()
          old = 'with ThreadPoolExecutor(max_workers=2) as pool:'
          new = 'with ThreadPoolExecutor(max_workers=12) as pool:'
          if old not in text:
              raise SystemExit('expected worker setting not found')
          text = text.replace(old, new, 1)
          text = text.replace('time.sleep(0.10)', 'time.sleep(0.02)', 1)
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/temporary_gbpusd_acquisition.yml
          git rm temporary/patch_gbpusd_transport.trigger
          git commit -m "Increase GBPUSD static-feed transport parallelism"
          git push origin HEAD:agent/gbpusd-dtr-replication
