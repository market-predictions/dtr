name: One-time Auction-State Causal Fix

on:
  pull_request:
    paths:
      - ".github/workflows/asia-sweep-one-time-causal-fix.yml"

permissions:
  contents: write

jobs:
  patch-and-remove:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          show-progress: false

      - name: Apply line-addressed causal corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/dtr_lab/strategies/asia_sweep/auction_state.py")
          lines = path.read_text().splitlines(keepends=True)

          opposite_start = next(
              index
              for index, line in enumerate(lines)
              if line == '    if first_side == "UP":\n'
              and lines[index + 1]
              == '        opposite = bars.iloc[first_index : decision_end + 1]\n'
          )
          candidates_start = next(
              index
              for index in range(opposite_start, len(lines))
              if lines[index] == '    candidates = [\n'
          )
          detection_end = next(
              index
              for index in range(candidates_start, len(lines))
              if lines[index]
              == '    detection_index = min(candidates) if candidates else decision_end\n'
          )
          opposite_block = lines[opposite_start:candidates_start]
          candidates_block = lines[candidates_start : detection_end + 1]
          opposite_block = [
              line.replace("decision_end + 1", "detection_index + 1")
              for line in opposite_block
          ]
          lines = (
              lines[:opposite_start]
              + candidates_block
              + opposite_block
              + lines[detection_end + 1 :]
          )

          session_line = '        & (minutes.index <= window_end)\n'
          horizon_line = '        subset = path.loc[path.index <= horizon_end]\n'
          if lines.count(session_line) != 1:
              raise SystemExit("unexpected session endpoint occurrence count")
          if lines.count(horizon_line) != 1:
              raise SystemExit("unexpected fixed-horizon occurrence count")
          lines[lines.index(session_line)] = '        & (minutes.index < window_end)\n'
          lines[lines.index(horizon_line)] = (
              '        subset = path.loc[path.index < horizon_end]\n'
          )

          path.write_text("".join(lines))
          Path(".github/workflows/asia-sweep-one-time-causal-fix.yml").unlink()
          PY

      - name: Commit exact corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/dtr_lab/strategies/asia_sweep/auction_state.py \
            .github/workflows/asia-sweep-one-time-causal-fix.yml
          git commit -m "Correct auction-state causal horizons"
          git push origin HEAD:${{ github.head_ref }}
