name: Fix USA500 residual lint

on:
  pull_request:
    paths:
      - temporary/fix_usa500_residual_lint.trigger

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/usa500-baseline-discovery
          fetch-depth: 0
      - name: Wrap residual long strings
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('scripts/review_usa500_baseline_discovery.py'): (
                  '        "interpretation": "All calculations and promotion decisions reproduced from the saved trade streams. Independent bootstrap seeds are descriptive and do not convert retrospective USA500 development into out-of-sample evidence.",\n',
                  '        "interpretation": (\n'
                  '            "All calculations and promotion decisions reproduced from the saved "\n'
                  '            "trade streams. Independent bootstrap seeds are descriptive and do "\n'
                  '            "not convert retrospective USA500 development into out-of-sample "\n'
                  '            "evidence."\n'
                  '        ),\n',
              ),
              Path('scripts/review_usa500_session_decomposition.py'): (
                  '        "interpretation": "London-only is positive at one and two ticks but fails the frozen year-stability gate because 2022 and 2025 are negative. It remains diagnostic and is not a USA500 baseline.",\n',
                  '        "interpretation": (\n'
                  '            "London-only is positive at one and two ticks but fails the frozen "\n'
                  '            "year-stability gate because 2022 and 2025 are negative. It remains "\n'
                  '            "diagnostic and is not a USA500 baseline."\n'
                  '        ),\n',
              ),
          }
          for path, (old, new) in replacements.items():
              content = path.read_text(encoding='utf-8')
              if old not in content:
                  raise SystemExit(f'expected string not found in {path}')
              path.write_text(content.replace(old, new), encoding='utf-8')
          PY
          pipx run --spec ruff==0.15.22 ruff format \
            scripts/review_usa500_baseline_discovery.py \
            scripts/review_usa500_session_decomposition.py
          pipx run --spec ruff==0.15.22 ruff check \
            scripts/run_usa500_baseline_discovery.py \
            scripts/review_usa500_baseline_discovery.py \
            scripts/run_usa500_session_decomposition.py \
            scripts/review_usa500_session_decomposition.py
      - name: Commit lint fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/review_usa500_baseline_discovery.py \
                  scripts/review_usa500_session_decomposition.py
          git rm temporary/fix_usa500_residual_lint.trigger
          git commit -m "Fix USA500 review lint"
          git push origin HEAD:agent/usa500-baseline-discovery
