name: Stoic NQ Long-Only Validation

on:
  workflow_dispatch:
  push:
    branches:
      - agent/stoic-nq-long-only-validation
    paths:
      - ".github/workflows/stoic-nq-long-only-validation.yml"
      - "scripts/run_stoic_nq_long_only_validation.py"
      - "scripts/preflight_stoic_nq_long_only_validation.py"
      - "scripts/finalize_stoic_nq_long_only_validation.py"
      - "src/stoic_123_lab/**"
      - "strategies/stoic_123/configs/nq_long_only_validation.yaml"
      - "strategies/stoic_123/configs/phase1.yaml"
      - "tests/test_stoic_123_validation.py"
      - "tests/test_stoic_123_validation_backtest.py"

concurrency:
  group: stoic-nq-long-only-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,research]"

      - name: Ruff
        run: ruff check .

      - name: Validation tests
        run: >-
          pytest -q
          tests/test_stoic_123_validation.py
          tests/test_stoic_123_validation_backtest.py
          tests/test_stoic_123.py
          tests/test_stoic_123_gbpusd.py

      - name: Acquire registered public NQ archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p private-data
          curl --location --fail --retry 4 --retry-all-errors \
            "https://www.kaggle.com/api/v1/datasets/download/tgtanalytics/nq-futures-1min-bar-2022-2025" \
            --output private-data/NQ_Futures_-_1min_Bar_2022_2025.zip
          observed="$(sha256sum private-data/NQ_Futures_-_1min_Bar_2022_2025.zip | awk '{print $1}')"
          echo "Observed NQ archive SHA-256: ${observed}"
          test "${observed}" = "8d3f157a422636e5b8dda51cc3a3d9209c50cb53f9b279d3e14b627ce59370dc"

      - name: Enforce frozen input contract
        run: |
          python scripts/preflight_stoic_nq_long_only_validation.py \
            --nq private-data/NQ_Futures_-_1min_Bar_2022_2025.zip \
            --phase1 strategies/stoic_123/configs/phase1.yaml \
            --design strategies/stoic_123/configs/nq_long_only_validation.yaml \
            --out reports/stoic_123/nq_long_only_validation

      - name: Execute preregistered study
        run: |
          python scripts/run_stoic_nq_long_only_validation.py \
            --nq private-data/NQ_Futures_-_1min_Bar_2022_2025.zip \
            --phase1 strategies/stoic_123/configs/phase1.yaml \
            --design strategies/stoic_123/configs/nq_long_only_validation.yaml \
            --out reports/stoic_123/nq_long_only_validation \
            --iterations 10000

      - name: Apply frozen matched-control veto
        run: |
          python scripts/finalize_stoic_nq_long_only_validation.py \
            --out reports/stoic_123/nq_long_only_validation

      - name: Remove raw market data
        if: always()
        run: rm -rf private-data

      - name: Enforce no raw data in results
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if find reports -type f \( -name '*.zip' -o -name '*.parquet' -o -name '*1min*' \) | grep -q .; then
            echo "Unexpected raw-like data object in result payload"
            exit 1
          fi

      - name: Upload compact validation package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: stoic-nq-long-only-validation
          path: reports/stoic_123/nq_long_only_validation
          if-no-files-found: error
          retention-days: 7
